  <!-- ola caribe debajo -->
  <path d="M 200 340 Q 250 320 300 340 Q 350 360 400 340" stroke="#C9A24B" stroke-width="4" fill="none"/>

  <text x="300" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#F4EBD0" letter-spacing="4">COSTA</text>
