<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#1F3D3D"/>
  <rect x="30" y="30" width="540" height="540" fill="none" stroke="#C9A24B" stroke-width="2"/>
  <rect x="42" y="42" width="516" height="516" fill="none" stroke="#C9A24B" stroke-width="1"/>

  <!-- silueta de cedro (rama estilizada) -->
