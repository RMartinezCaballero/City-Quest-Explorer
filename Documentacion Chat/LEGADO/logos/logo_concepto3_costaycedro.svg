  <text x="300" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#F4EBD0" letter-spacing="4">CEDRO</text>
  <text x="300" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#C9A24B" letter-spacing="3">SELLO EDITORIAL · LEGADO</text>
