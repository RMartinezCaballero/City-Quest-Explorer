    <line x1="300" y1="150" x2="300" y2="330"/>
    <line x1="300" y1="180" x2="255" y2="150"/>
    <line x1="300" y1="180" x2="345" y2="150"/>
    <line x1="300" y1="220" x2="245" y2="195"/>
    <line x1="300" y1="220" x2="355" y2="195"/>
    <line x1="300" y1="260" x2="240" y2="240"/>
    <line x1="300" y1="260" x2="360" y2="240"/>
  </g>
  <g fill="#C9A24B">
