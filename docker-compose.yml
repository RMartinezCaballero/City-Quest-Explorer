version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: city_quest
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/city_quest
      JWT_SECRET: supersecretjwtkey
      PORT: 3000
    ports:
      - '3000:3000'
volumes:
  db-data:
